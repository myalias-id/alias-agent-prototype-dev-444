name: Deploy Next.js (next-on-pages) to Cloudflare Pages

on:
  push:
    branches: ['main']           # ✅ keep your push deploys
  workflow_dispatch:
    inputs:
      env:
        description: "Environment to deploy"
        required: true
        default: "preview"
        type: choice
        options: [preview, production]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # These are made available to the shell scripts below
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_PAGES_PROJECT: ${{ secrets.CF_PAGES_PROJECT }}
      # Entire secrets context dumped as JSON so subsequent shell steps can
      # iterate every CF_VAR_* and CF_SECRET_* secret without us having to
      # enumerate names in YAML. GitHub Actions doesn't allow dynamic
      # ${{ secrets.* }} lookup by computed name — toJSON(secrets) is the
      # supported escape hatch.
      ALL_SECRETS_JSON: ${{ toJSON(secrets) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies (Yarn)
        run: |
          if [ -f yarn.lock ]; then
            (yarn install --immutable) || (yarn install --frozen-lockfile) || (yarn install)
          else
            yarn install
          fi

      # push -> production, manual -> inputs.env
      - name: Set DEPLOY_ENV
        run: echo "DEPLOY_ENV=${{ github.event_name == 'push' && 'production' || inputs.env }}" >> "$GITHUB_ENV"

      - name: Export CF_VAR_* and CF_SECRET_* to build environment
        run: |
          # Both prefixes flow into $GITHUB_ENV so Next.js build can read them.
          # Naming is preserved minus the prefix:
          #   CF_VAR_FOO=bar    -> FOO=bar
          #   CF_SECRET_BAZ=qux -> BAZ=qux
          echo "$ALL_SECRETS_JSON" | jq -r '
            to_entries[]
            | select(.key | startswith("CF_VAR_") or startswith("CF_SECRET_"))
            | (.key | sub("^CF_VAR_"; "") | sub("^CF_SECRET_"; "")) + "=" + .value
          ' >> "$GITHUB_ENV"

          # Sanity check — agent ID is always present after deploy.
          if ! grep -q '^NEXT_PUBLIC_AGENT_ID=' "$GITHUB_ENV"; then
            echo "::error::Failed to find NEXT_PUBLIC_AGENT_ID — was CF_SECRET_NEXT_PUBLIC_AGENT_ID set?"
            exit 1
          fi

      - name: Build (next-on-pages)
        run: yarn dlx @cloudflare/next-on-pages@latest

      # ⚠️ Use a shell step (wrangler-action can't parse it)
      - name: Ensure Pages project exists
        run: |
          yarn dlx wrangler@4 pages project create "${CF_PAGES_PROJECT}" --production-branch main || echo "project exists"

      - name: Put Pages runtime secrets (CF_SECRET_*)
        run: |
          # sanity: show who wrangler thinks you are + which account
          yarn dlx wrangler@4 whoami

          # Iterate every CF_SECRET_* and push to the Pages project.
          # CF_VAR_* are build-time only — we don't push those as runtime
          # secrets because they're (by convention) public values.
          echo "$ALL_SECRETS_JSON"             | jq -r '
                to_entries[]
                | select(.key | startswith("CF_SECRET_"))
                | @base64
              '             | while read -r line; do
                pair=$(echo "$line" | base64 -d)
                full_key=$(echo "$pair" | jq -r '.key')
                val=$(echo "$pair" | jq -r '.value')
                key="${full_key#CF_SECRET_}"

                printf "%s" "$val" | yarn dlx wrangler@4 pages secret put "$key" --project-name "${CF_PAGES_PROJECT}"
              done

      - name: Deploy to Pages (production)
        if: env.DEPLOY_ENV == 'production'
        id: deploy_prod
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name "${{ env.CF_PAGES_PROJECT }}" --branch main --commit-dirty=true

      - name: Deploy to Pages (preview)
        if: env.DEPLOY_ENV != 'production'
        id: deploy_prev
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name "${{ env.CF_PAGES_PROJECT }}" --branch ${{ github.ref_name }} --commit-dirty=true

      - name: Output deployment URLs
        run: |
          echo "Production: https://${{ env.CF_PAGES_PROJECT }}.pages.dev"
          echo "Preview (branch): https://${{ github.ref_name }}.${{ env.CF_PAGES_PROJECT }}.pages.dev"
